# HomeSec cameras app — local-only stack.
#
# Today: two services (go2rtc + ntfy).
# Coming later: a `backend` service that subscribes to the UniFi Protect
# event stream and POSTs AI events to ntfy, and a `frontend` service that
# serves the LAN-only live-view grid.
#
# Run from this directory:
#   docker compose up
#
# All services are LAN-only. Do not expose any of these ports to the
# internet. Access control is enforced at the pfSense firewall, not here.

services:
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: homesec-go2rtc
    restart: unless-stopped
    network_mode: host   # needed for WebRTC ICE on the LAN
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml:ro

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: homesec-ntfy
    restart: unless-stopped
    command:
      - serve
    environment:
      - TZ=America/New_York
      - NTFY_BASE_URL=http://ntfy.lan
      - NTFY_LISTEN_HTTP=:80
      - NTFY_BEHIND_PROXY=false
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_CACHE_FILE=/var/lib/ntfy/cache.db
      - NTFY_ATTACHMENT_CACHE_DIR=/var/lib/ntfy/attachments
    volumes:
      - ntfy-data:/var/lib/ntfy
    ports:
      # Bind to localhost only by default. Change to a LAN IP once you've
      # decided where the cameras app host lives on the network.
      - "127.0.0.1:8080:80"

  # backend:
  #   Placeholder. Will be added once the backend language is picked
  #   (Node.js + TypeScript with hjdhjd/unifi-protect, OR Python with
  #   pyunifiprotect). Responsibilities: connect to the UNVR Instant,
  #   subscribe to the Protect WebSocket event stream, filter for AI
  #   detections (person / vehicle / package / animal), and POST each
  #   event to the ntfy service above.

  # frontend:
  #   Placeholder. Will serve a LAN-only grid of the 7 camera tiles,
  #   consuming WebRTC streams from go2rtc and the event feed from the
  #   backend. No auth at this layer — LAN-only behind the firewall.

volumes:
  ntfy-data:
