# /etc/mosquitto/conf.d/homesec.conf
#
# HomeSec Mosquitto broker config — installed inside the
# homesec-cameras-mqtt LXC. LAN-only, auth required, no anonymous.
#
# DO NOT expose port 1883 to WAN. This config uses plaintext MQTT
# (no TLS) because the broker is on a trusted VLAN behind pfSense.
# TLS + mutual client certs is a future hardening step; add it when
# multiple HomeSec sections start publishing cross-section events.

# ------------------------------------------------------------------
# Listener: plaintext on the container's IP, port 1883. LAN only.
# ------------------------------------------------------------------
listener 1883 0.0.0.0

# ------------------------------------------------------------------
# Authentication: required, no anonymous.
# ------------------------------------------------------------------
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl

# ------------------------------------------------------------------
# Persistence: keep retained messages and queued QoS>0 messages
# across broker restarts.
# ------------------------------------------------------------------
persistence true
persistence_location /var/lib/mosquitto/
autosave_interval 1800

# ------------------------------------------------------------------
# Logging: journald only. No flat log files — we don't want
# long-running log growth inside the LXC.
# ------------------------------------------------------------------
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
connection_messages true

# ------------------------------------------------------------------
# Limits — prevent a misbehaving client from exhausting broker state.
# ------------------------------------------------------------------
max_connections -1
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 1048576        # 1 MiB per message max
max_keepalive 120
retry_interval 20

# ------------------------------------------------------------------
# Client session handling
# ------------------------------------------------------------------
persistent_client_expiration 14d
queue_qos0_messages false
